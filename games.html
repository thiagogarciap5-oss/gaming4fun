                ctx.fillStyle = selectedColor;
                ctx.fillRect(x, y, 10, 10);
            });
            
            canvas.addEventListener('mouseup', () => drawing = false);
            canvas.addEventListener('mouseleave', () => drawing = false);
            
            wrapper.appendChild(palette);
            wrapper.appendChild(canvas);
            container.appendChild(wrapper);
        }

        // ==================== SUDOKU ====================
        function initSudoku(container) {
            const wrapper = document.createElement('div');
            wrapper.style.cssText = 'text-align: center;';
            
            const board = document.createElement('div');
            board.style.cssText = 'display: grid; grid-template-columns: repeat(9, 40px); gap: 2px; margin: 0 auto; width: fit-content;';
            
            // Simple puzzle (0 = empty)
            const puzzle = [
                [5,3,0,0,7,0,0,0,0],
                [6,0,0,1,9,5,0,0,0],
                [0,9,8,0,0,0,0,6,0],
                [8,0,0,0,6,0,0,0,3],
                [4,0,0,8,0,3,0,0,1],
                [7,0,0,0,2,0,0,0,6],
                [0,6,0,0,0,0,2,8,0],
                [0,0,0,4,1,9,0,0,5],
                [0,0,0,0,8,0,0,7,9]
            ];
            
            let solution = JSON.parse(JSON.stringify(puzzle));
            solveSudoku(solution);
            let current = puzzle.map(row => [...row]);
            
            function solveSudoku(board) {
                const isValid = (board, row, col, num) => {
                    for (let i = 0; i < 9; i++) {
                        if (board[row][i] === num || board[i][col] === num) return false;
                    }
                    const boxRow = Math.floor(row / 3) * 3;
                    const boxCol = Math.floor(col / 3) * 3;
                    for (let i = 0; i < 3; i++) {
                        for (let j = 0; j < 3; j++) {
                            if (board[boxRow + i][boxCol + j] === num) return false;
                        }
                    }
                    return true;
                };
                
                const solve = () => {
                    for (let row = 0; row < 9; row++) {
                        for (let col = 0; col < 9; col++) {
                            if (board[row][col] === 0) {
                                for (let num = 1; num <= 9; num++) {
                                    if (isValid(board, row, col, num)) {
                                        board[row][col] = num;
                                        if (solve()) return true;
                                        board[row][col] = 0;
                                    }
                                }
                                return false;
                            }
                        }
                    }
                    return true;
                };
                
                solve();
            }
            
            function render() {
                board.innerHTML = '';
                for (let i = 0; i < 9; i++) {
                    for (let j = 0; j < 9; j++) {
                        const cell = document.createElement('div');
                        cell.style.cssText = `
                            width: 40px; height: 40px; 
                            display: flex; align-items: center; justify-content: center;
                            font-family: "VT323"; font-size: 1.5rem;
                            background: ${(i + j) % 2 ? '#d6d3d1' : '#fff'};
                            border: ${(j % 3 === 0 && j !== 0) || (i % 3 === 0 && i !== 0) ? '2px solid #333' : '1px solid #999'};
                            cursor: pointer;
                        `;
                        
                        if (current[i][j] !== 0) {
                            cell.textContent = current[i][j];
                            cell.style.color = puzzle[i][j] !== 0 ? '#333' : '#3b82f6';
                            cell.style.fontWeight = puzzle[i][j] !== 0 ? 'bold' : 'normal';
                        }
                        
                        cell.onclick = () => {
                            if (puzzle[i][j] !== 0) return;
                            // Cycle through 1-9
                            current[i][j] = (current[i][j] + 1) % 10;
                            render();
                            
                            // Check win
                            const won = current.every((row, ri) => 
                                row.every((val, ci) => val === solution[ri][ci])
                            );
                            if (won) updateScore(1000);
                        };
                        
                        board.appendChild(cell);
                    }
                }
            }
            
            wrapper.appendChild(board);
            container.appendChild(wrapper);
            render();
        }

        // ==================== AMONG US / CREWMATE ESCAPE ====================
        function initAmongUs(container) {
            const canvas = document.createElement('canvas');
            canvas.width = 600;
            canvas.height = 400;
            container.appendChild(canvas);
            
            const ctx = canvas.getContext('2d');
            
            let player = { x: 50, y: 50, size: 30 };
            let exit = { x: 550, y: 350, w: 40, h: 40 };
            let imposter = { x: 300, y: 200, vx: 2, vy: 1 };
            let obstacles = [];
            let score = 0;
            let gameRunning = false;
            let won = false;
            
            // Create maze-like obstacles
            for (let i = 0; i < 8; i++) {
                obstacles.push({
                    x: 100 + i * 60 + Math.random() * 20,
                    y: 50 + (i % 3) * 120,
                    w: 40,
                    h: 80
                });
            }
            
            function draw() {
                // Background
                const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                grad.addColorStop(0, '#1e3a5f');
                grad.addColorStop(1, '#0f172a');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Grid pattern
                ctx.strokeStyle = '#334155';
                ctx.lineWidth = 1;
                for (let x = 0; x < canvas.width; x += 40) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, canvas.height);
                    ctx.stroke();
                }
                for (let y = 0; y < canvas.height; y += 40) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(canvas.width, y);
                    ctx.stroke();
                }
                
                // Obstacles
                ctx.fillStyle = '#475569';
                obstacles.forEach(obs => {
                    ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
                    ctx.fillStyle = '#64748b';
                    ctx.fillRect(obs.x, obs.y, obs.w, 10);
                    ctx.fillStyle = '#475569';
                });
                
                // Exit
                ctx.fillStyle = won ? '#22c55e' : '#ef4444';
                ctx.fillRect(exit.x, exit.y, exit.w, exit.h);
                ctx.fillStyle = '#fff';
                ctx.font = '20px "Silkscreen"';
                ctx.fillText('EXIT', exit.x + 2, exit.y + 25);
                
                // Imposter
                ctx.fillStyle = '#ef4444';
                // Body
                ctx.fillRect(imposter.x - 15, imposter.y - 10, 30, 25);
                // Visor
                ctx.fillStyle = '#3b82f6';
                ctx.fillRect(imposter.x - 12, imposter.y - 5, 24, 10);
                // Legs
                ctx.fillStyle = '#ef4444';
                ctx.fillRect(imposter.x - 10, imposter.y + 15, 8, 15);
                ctx.fillRect(imposter.x + 2, imposter.y + 15, 8, 15);
                
                // Player (crewmate)
                ctx.fillStyle = '#22c55e';
                ctx.fillRect(player.x - 15, player.y - 10, 30, 25);
                ctx.fillStyle = '#fff';
                ctx.fillRect(player.x - 12, player.y - 5, 24, 10);
                ctx.fillStyle = '#22c55e';
                ctx.fillRect(player.x - 10, player.y + 15, 8, 15);
                ctx.fillRect(player.x + 2, player.y + 15, 8, 15);
                
                // Status
                ctx.fillStyle = '#fff';
                ctx.font = '16px "VT323"';
                if (won) {
                    ctx.fillText('ESCAPED! Press R to play again', 200, 30);
                } else if (!gameRunning) {
                    ctx.fillText('Press SPACE to start - Reach the exit!', 180, 30);
                }
            }
            
            function update() {
                if (!gameRunning || won) return;
                
                // Move imposter
                imposter.x += imposter.vx;
                imposter.y += imposter.vy;
                
                if (imposter.x < 20 || imposter.x > canvas.width - 20) imposter.vx *= -1;
                if (imposter.y < 20 || imposter.y > canvas.height - 50) imposter.vy *= -1;
                
                // Collision with imposter
                const dist = Math.sqrt((player.x - imposter.x) ** 2 + (player.y - imposter.y) ** 2);
                if (dist < 40) {
                    gameRunning = false;
                }
                
                // Reached exit
                if (player.x > exit.x && player.x < exit.x + exit.w &&
                    player.y > exit.y && player.y < exit.y + exit.h) {
                    won = true;
                    gameRunning = false;
                    score = 1000;
                    updateScore(score);
                }
                
                // Speed up imposter
                if (score > 0 && Math.abs(imposter.vx) < 4) {
                    imposter.vx *= 1.01;
                    imposter.vy *= 1.01;
                }
            }
            
            function loop() {
                update();
                draw();
                if (gameRunning) requestAnimationFrame(loop);
            }
            
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' && !gameRunning) {
                    gameRunning = true;
                    loop();
                }
                if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') player.y = Math.max(20, player.y - 8);
                if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') player.y = Math.min(canvas.height - 30, player.y + 8);
                if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') player.x = Math.max(20, player.x - 8);
                if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') player.x = Math.min(canvas.width - 20, player.x + 8);
                if (e.key === 'r' || e.key === 'R') {
                    player = { x: 50, y: 50, size: 30 };
                    imposter = { x: 300, y: 200, vx: 2, vy: 1 };
                    won = false;
                    gameRunning = false;
                    updateScore(0);
                    draw();
                }
            });
            
            draw();
        }

        // Keyboard shortcut to close modal
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeGame();
        });
    </script>
</body>
